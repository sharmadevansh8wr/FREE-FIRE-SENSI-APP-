<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DEVIL STORE | Premium Digital Products</title>
  <!-- Ad Script (Added as requested) -->
  <script src="https://pl29108076.profitablecpmratenetwork.com/f7/18/e0/f718e064e211c9e4170ea0ac1f3690f1.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-content {
      text-align: center;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #00ffff;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #00ffff;
      font-size: 18px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Notification Toast */
    .notification-toast {
      position: fixed;
      top: 80px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      border: 1px solid #00ffff;
      border-radius: 12px;
      padding: 15px 20px;
      color: #00ffff;
      z-index: 10001;
      display: none;
      animation: slideInRight 0.4s ease;
      box-shadow: 0 8px 32px rgba(0, 255, 255, 0.4);
      max-width: 350px;
      backdrop-filter: blur(20px);
    }

    @keyframes slideInRight {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .notification-toast.show {
      display: block;
    }

    .notification-toast.success {
      border-color: #00ff88;
      color: #00ff88;
    }

    .notification-toast.error {
      border-color: #ff006e;
      color: #ff006e;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 16px rgba(0, 255, 255, 0.1);
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .hamburger {
      width: 30px;
      height: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      z-index: 1001;
      transition: transform 0.3s ease;
    }

    .hamburger:hover {
      transform: scale(1.1);
    }

    .hamburger span {
      width: 100%;
      height: 3px;
      background: linear-gradient(135deg, #00ffff, #a855f7);
      border-radius: 3px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translateY(10px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: translateX(-20px);
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translateY(-10px);
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: center;
      animation: fadeIn 0.6s ease 0.2s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      transition: all 0.3s ease;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .brand-name {
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient 3s ease infinite;
      background-size: 200% 200%;
    }

    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .header-icons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .header-icon {
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #00ffff;
      font-size: 16px;
      position: relative;
    }

    .header-icon:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: #00ffff;
      transform: translateY(-2px) rotate(5deg);
      box-shadow: 0 4px 16px rgba(0, 255, 255, 0.4);
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: linear-gradient(135deg, #ff006e, #ff4d00);
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Sidebar Menu */
    .sidebar {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, rgba(26, 10, 46, 0.98) 0%, rgba(10, 10, 10, 0.98) 100%);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 255, 255, 0.3);
      padding: 80px 20px 20px;
      transition: left 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 999;
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0, 255, 255, 0.2);
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
      z-index: 998;
      backdrop-filter: blur(5px);
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .menu-item {
      padding: 15px 20px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #00ffff;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInLeft 0.4s ease backwards;
      position: relative;
      overflow: hidden;
    }

    .menu-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .menu-item:hover::before {
      left: 100%;
    }

    .menu-item:hover {
      background: rgba(0, 255, 255, 0.15);
      border-color: #00ffff;
      transform: translateX(5px) scale(1.02);
      box-shadow: 0 4px 16px rgba(0, 255, 255, 0.3);
    }

    .menu-item i {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .menu-username {
      padding: 20px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(168, 85, 247, 0.15));
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      animation: slideInLeft 0.4s ease backwards;
      position: relative;
      overflow: hidden;
    }

    /* Search Bar */
    .search-container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeInUp 0.6s ease 0.3s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-wrapper {
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 15px 50px 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .search-bar:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.02);
    }

    .search-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffff;
      font-size: 18px;
      pointer-events: none;
    }

    /* Cart Sidebar */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: min(400px, 90vw);
      height: 100vh;
      background: linear-gradient(180deg, rgba(26, 10, 46, 0.98) 0%, rgba(10, 10, 10, 0.98) 100%);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(0, 255, 255, 0.3);
      z-index: 999;
      transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      overflow-y: auto;
      box-shadow: -4px 0 24px rgba(0, 255, 255, 0.2);
      padding: 20px;
    }

    .cart-sidebar.active {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }

    .cart-title {
      font-size: 24px;
      color: #00ffff;
      font-weight: bold;
    }

    .cart-close {
      width: 35px;
      height: 35px;
      background: rgba(255, 0, 110, 0.2);
      border: 1px solid #ff006e;
      border-radius: 50%;
      color: #ff006e;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .cart-close:hover {
      background: #ff006e;
      color: #fff;
      transform: rotate(90deg);
    }

    .cart-item {
      display: flex;
      gap: 15px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-title {
      font-size: 16px;
      color: #00ffff;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .cart-item-price {
      color: #00ff88;
      font-size: 18px;
      font-weight: bold;
    }

    .cart-item-remove {
      color: #ff006e;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 18px;
    }

    .cart-item-remove:hover {
      transform: scale(1.2) rotate(90deg);
    }

    .cart-total {
      padding: 20px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 12px;
      margin: 20px 0;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .cart-total-amount {
      font-size: 32px;
      color: #00ff88;
      font-weight: bold;
    }

    .cart-checkout-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00ffff, #a855f7);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .cart-checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 20px;
      color: #00ffff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      position: relative;
      display: inline-block;
    }

    .filter-slider-container {
      margin-bottom: 20px;
      overflow: hidden;
    }

    .filter-slider {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 10px 0;
      scrollbar-width: none;
    }

    .filter-slider::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      color: #00ffff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #00ffff, #a855f7);
      color: #000;
      border-color: transparent;
    }

    /* Product Grid - 2 columns */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-bottom: 40px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 15px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: scaleIn 0.5s ease backwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 45px rgba(0, 255, 255, 0.4);
      border-color: rgba(0, 255, 255, 0.5);
    }

    .product-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #ff006e, #ff4d00);
      color: #fff;
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: bold;
      z-index: 2;
    }

    .product-image {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 2px solid rgba(0, 255, 255, 0.3);
      transition: all 0.4s ease;
      background: rgba(0, 0, 0, 0.3);
    }

    .product-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #00ffff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-description {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .product-price-original {
      text-decoration: line-through;
      color: #666;
      font-size: 14px;
    }

    .product-price-discount {
      color: #00ff88;
      font-size: 20px;
      font-weight: bold;
    }

    .product-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #00ffff, #a855f7);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #00ffff;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 24px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(255, 0, 110, 0.2);
      border: 1px solid #ff006e;
      border-radius: 50%;
      color: #ff006e;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-image {
      width: 100%;
      height: 300px;
      object-fit: contain;
      border-radius: 16px;
      margin: 20px 0;
      border: 2px solid rgba(0, 255, 255, 0.3);
    }

    .price-section {
      margin-bottom: 25px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
    }

    .price-discount {
      color: #00ff88;
      font-size: 32px;
      font-weight: bold;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .qr-image {
      width: 100%;
      max-width: 300px;
      height: auto;
      margin: 20px auto;
      display: block;
      border-radius: 16px;
      border: 2px solid #00ffff;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #00ffff;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 12px;
      color: #fff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .product-image {
        height: 150px;
      }
      .brand-name {
        font-size: 16px;
      }
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 40px 0;
    }

    .pagination-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      color: #00ffff;
      cursor: pointer;
    }

    .pagination-btn.active {
      background: linear-gradient(135deg, #00ffff, #a855f7);
      color: #000;
    }

    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #00ffff, #a855f7);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
    }

    .fab.show {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="loading-content"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div></div>
  <div class="notification-toast" id="notificationToast"></div>
  <div class="header">
    <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="brand-section"><div class="brand-name">DEVIL STORE</div></div>
    <div class="header-icons"><div class="header-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartBadge" style="display: none;">0</span></div></div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar"><div id="menuContent"></div></div>
  <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><div class="cart-title">Cart</div><div class="cart-close" onclick="toggleCart()">×</div></div><div id="cartItems"></div><div class="cart-total" id="cartTotal" style="display: none;"><div class="cart-total-amount" id="cartTotalAmount">₹0</div></div><button class="cart-checkout-btn" id="cartCheckoutBtn" onclick="checkoutCart()" disabled>Checkout</button></div>
  <div class="search-container"><div class="search-wrapper"><input type="text" class="search-bar" id="searchBar" placeholder="Search products..." oninput="searchProducts()"><span class="search-icon"><i class="fas fa-search"></i></span></div></div>
  <div class="container"><div id="mainContent"><div class="filter-slider-container"><div class="filter-slider" id="filterSlider"><button class="filter-btn active" data-filter="all" onclick="filterProducts('all')">All</button><button class="filter-btn" data-filter="premium" onclick="filterProducts('premium')">Premium</button><button class="filter-btn" data-filter="budget" onclick="filterProducts('budget')">Budget</button><button class="filter-btn" data-filter="free" onclick="filterProducts('free')">Free</button></div></div><h2 class="section-title">Products</h2><div id="productsGrid" class="products-grid"></div><div class="pagination" id="pagination"></div></div></div>
  <div id="productModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('productModal')">×</span><img id="modalImage" class="modal-image"><h2 id="modalTitle" class="modal-title"></h2><p id="modalDescription"></p><div class="price-section"><span id="modalPriceDiscount" class="price-discount"></span></div><div class="btn-group" id="modalButtonGroup"></div></div></div>
  <div id="checkoutModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('checkoutModal')">×</span><h2>Checkout</h2><div id="checkoutItems"></div><div class="price-breakdown"><div>Total: <span id="checkoutTotal">₹0</span></div></div><div class="btn-group"><button class="btn" onclick="proceedToPayment()">Pay</button></div></div></div>
  <div id="paymentModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('paymentModal')">×</span><h2>Payment</h2><img class="qr-image" src="https://i.ibb.co/C3ms1LPT/IMG-20260312-092237.jpg"><div class="input-group"><label>Amount Paid</label><input type="number" id="userAmount"></div><div class="input-group"><label>UTR ID</label><input type="text" id="utrId"></div><button class="btn" onclick="confirmPurchase()">Confirm</button></div></div>
  <div id="authModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('authModal')">×</span><h2>Login</h2><div><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button onclick="loginUser()">Login</button><p onclick="switchToSignup()">Signup</p></div></div></div>
  <div class="fab" id="fab" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';
    import { getDatabase, ref, set, get, push, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js';
    const firebaseConfig = { apiKey: "AIzaSyDS472wskQQiDIIpuXo5T1ZnxJTGCVyyoQ", authDomain: "mr-hacker-d6d7f.firebaseapp.com", databaseURL: "https://mr-hacker-d6d7f-default-rtdb.firebaseio.com", projectId: "mr-hacker-d6d7f", storageBucket: "mr-hacker-d6d7f.firebasestorage.app", messagingSenderId: "414827898605", appId: "1:414827898605:web:c836aa47a775cd2e87cee4" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    window.auth = auth; window.db = db; window.dbRef = ref; window.dbSet = set; window.dbGet = get; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove; window.dbUpdate = update;
    window.currentUser = null; window.allProducts = []; window.cart = []; window.currentPage = 1; const ITEMS_PER_PAGE = 12;
    function showNotification(msg, type='success') { let t = document.getElementById('notificationToast'); t.textContent = msg; t.className = `notification-toast show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); }
    function showLoading(show=true) { document.getElementById('loadingOverlay').classList.toggle('active', show); }
    function toggleMenu() { document.getElementById('hamburger').classList.toggle('active'); document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
    function updateMenu() { let menu = document.getElementById('menuContent'); if(window.currentUser) menu.innerHTML = `<div class="menu-username">${window.currentUser.displayName || window.currentUser.email}</div><div class="menu-item" onclick="showProducts()">Products</div><div class="menu-item" onclick="showPurchaseHistory()">Orders</div><div class="menu-item" onclick="logoutUser()">Logout</div>`; else menu.innerHTML = `<div class="menu-item" onclick="showProducts()">Products</div><div class="menu-item" onclick="showAuth()">Login</div>`; }
    function showProducts() { toggleMenu(); document.getElementById('mainContent').innerHTML = '<div class="filter-slider-container"><div class="filter-slider"><button class="filter-btn active" onclick="filterProducts(\'all\')">All</button><button class="filter-btn" onclick="filterProducts(\'premium\')">Premium</button><button class="filter-btn" onclick="filterProducts(\'budget\')">Budget</button><button class="filter-btn" onclick="filterProducts(\'free\')">Free</button></div></div><h2 class="section-title">Products</h2><div id="productsGrid" class="products-grid"></div><div class="pagination" id="pagination"></div>'; loadProducts(); }
    async function loadProducts() { showLoading(true); const snap = await get(ref(db, 'products')); showLoading(false); if(snap.exists()) { window.allProducts = Object.entries(snap.val()).map(([id,p])=>({id,...p})); displayProducts(window.allProducts); } }
    function displayProducts(products) { let start = (window.currentPage-1)*ITEMS_PER_PAGE; let paged = products.slice(start, start+ITEMS_PER_PAGE); let grid = document.getElementById('productsGrid'); grid.innerHTML = ''; paged.forEach(prod => { let card = document.createElement('div'); card.className = 'product-card'; card.innerHTML = `<img src="${prod.imageUrl}" class="product-image" onerror="this.src='https://via.placeholder.com/300/1a0a2e/00ffff'"><div class="product-title">${prod.title}</div><div class="product-price-discount">${prod.discountedPrice==0?'FREE':'₹'+prod.discountedPrice}</div><button class="btn" onclick="showProductDetail('${prod.id}')">View</button>`; grid.appendChild(card); }); updatePagination(products.length); }
    function updatePagination(total) { let pages = Math.ceil(total/ITEMS_PER_PAGE); let pg = document.getElementById('pagination'); if(pages<=1) { pg.style.display='none'; return; } pg.style.display='flex'; pg.innerHTML=''; for(let i=1;i<=pages;i++){ let btn=document.createElement('button'); btn.className=`pagination-btn ${i===window.currentPage?'active':''}`; btn.innerText=i; btn.onclick=()=>{ window.currentPage=i; displayProducts(getFilteredProducts()); }; pg.appendChild(btn); } }
    function getFilteredProducts() { let query = document.getElementById('searchBar').value.toLowerCase(); let filtered = window.allProducts; if(query) filtered = filtered.filter(p=>p.title.toLowerCase().includes(query)); if(window.currentFilter && window.currentFilter!=='all') { if(window.currentFilter==='premium') filtered = filtered.filter(p=>p.discountedPrice>=199 && p.discountedPrice<=2999); if(window.currentFilter==='budget') filtered = filtered.filter(p=>p.discountedPrice>=1 && p.discountedPrice<=198); if(window.currentFilter==='free') filtered = filtered.filter(p=>p.discountedPrice==0); } return filtered; }
    window.filterProducts = (filter) => { window.currentFilter=filter; window.currentPage=1; displayProducts(getFilteredProducts()); };
    window.searchProducts = () => { window.currentPage=1; displayProducts(getFilteredProducts()); };
    window.showProductDetail = async (id) => { showLoading(true); let snap = await get(ref(db, `products/${id}`)); showLoading(false); if(snap.exists()) { let p = snap.val(); document.getElementById('modalImage').src = p.imageUrl; document.getElementById('modalTitle').innerText = p.title; document.getElementById('modalDescription').innerText = p.description; document.getElementById('modalPriceDiscount').innerText = p.discountedPrice==0?'FREE':'₹'+p.discountedPrice; let btns = document.getElementById('modalButtonGroup'); if(p.discountedPrice==0) btns.innerHTML = `<button class="btn" onclick="window.open('${p.downloadLink}','_blank')">Free Download</button>`; else btns.innerHTML = `<button class="btn" onclick="addToCartDirect(${JSON.stringify({id:p.id,title:p.title,price:p.discountedPrice,image:p.imageUrl}).replace(/"/g, '&quot;')})">Add to Cart</button><button class="btn" onclick="buyNowDirect(${JSON.stringify({id:p.id,title:p.title,price:p.discountedPrice,image:p.imageUrl}).replace(/"/g, '&quot;')})">Buy Now</button>`; document.getElementById('productModal').classList.add('active'); } };
    window.addToCartDirect = (item) => { window.cart.push(item); saveCart(); updateCartUI(); showNotification(`${item.title} added to cart`); closeModal('productModal'); };
    window.buyNowDirect = (item) => { window.cart = [item]; saveCart(); updateCartUI(); closeModal('productModal'); setTimeout(()=>checkoutCart(),300); };
    function saveCart() { localStorage.setItem('shoppingCart', JSON.stringify(window.cart)); }
    function updateCartUI() { let badge = document.getElementById('cartBadge'); badge.innerText = window.cart.length; badge.style.display = window.cart.length ? 'block' : 'none'; let total = window.cart.reduce((s,i)=>s+parseFloat(i.price),0); document.getElementById('cartTotalAmount').innerText = '₹'+total; document.getElementById('cartCheckoutBtn').disabled = window.cart.length===0; let itemsDiv = document.getElementById('cartItems'); if(window.cart.length===0) itemsDiv.innerHTML = '<div class="empty-state">Cart empty</div>'; else itemsDiv.innerHTML = window.cart.map((item,idx)=>`<div class="cart-item"><img src="${item.image}" class="cart-item-image"><div>${item.title}<br>₹${item.price}</div><div class="cart-item-remove" onclick="removeFromCart(${idx})">✖</div></div>`).join(''); }
    window.removeFromCart = (idx) => { window.cart.splice(idx,1); saveCart(); updateCartUI(); };
    window.toggleCart = () => { document.getElementById('cartSidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); };
    window.checkoutCart = () => { if(!window.currentUser) { showNotification('Please login first','error'); showAuth(); return; } if(window.cart.length===0) return; let subtotal = window.cart.reduce((s,i)=>s+parseFloat(i.price),0); document.getElementById('checkoutTotal').innerText = '₹'+subtotal; document.getElementById('checkoutItems').innerHTML = window.cart.map(i=>`<div>${i.title} - ₹${i.price}</div>`).join(''); document.getElementById('checkoutModal').classList.add('active'); toggleCart(); };
    window.proceedToPayment = () => { closeModal('checkoutModal'); document.getElementById('paymentModal').classList.add('active'); };
    window.confirmPurchase = async () => { let utr = document.getElementById('utrId').value; let amount = document.getElementById('userAmount').value; if(!utr || !amount) return showNotification('Enter UTR and amount','error'); showLoading(true); for(let item of window.cart) { let orderRef = push(ref(db, 'orders')); await set(orderRef, { productId: item.id, productSnapshot: {title: item.title, imageUrl: item.image, discountedPrice: item.price}, userInput: {utrId: utr, name: window.currentUser.displayName, email: window.currentUser.email}, userId: window.currentUser.uid, finalAmount: amount, status: 'pending', createdAt: new Date().toISOString() }); await set(ref(db, `users/${window.currentUser.uid}/purchases/${orderRef.key}`), { orderId: orderRef.key, productId: item.id, purchasedAt: new Date().toISOString() }); } showLoading(false); showNotification('Order placed! Awaiting confirmation.'); window.cart = []; saveCart(); updateCartUI(); closeModal('paymentModal'); };
    window.showPurchaseHistory = async () => { if(!window.currentUser) return; toggleMenu(); showLoading(true); let snap = await get(ref(db, `users/${window.currentUser.uid}/purchases`)); showLoading(false); let html = '<h2>My Orders</h2>'; if(snap.exists()) { let purchases = Object.values(snap.val()); for(let p of purchases) { let orderSnap = await get(ref(db, `orders/${p.orderId}`)); if(orderSnap.exists()) { let o = orderSnap.val(); html += `<div class="order-card"><div>${o.productSnapshot.title}</div><div>₹${o.finalAmount}</div><div>Status: ${o.status}</div>${o.status==='confirmed' && o.productSnapshot.downloadLink ? `<button onclick="window.open('${o.productSnapshot.downloadLink}','_blank')">Download</button>` : ''}</div>`; } } } else html += '<div>No orders</div>'; document.getElementById('mainContent').innerHTML = html; };
    window.showAuth = () => { document.getElementById('authModal').classList.add('active'); };
    window.loginUser = async () => { let email = document.getElementById('loginEmail').value; let pwd = document.getElementById('loginPassword').value; try { await signInWithEmailAndPassword(auth, email, pwd); showNotification('Logged in'); closeModal('authModal'); } catch(e) { showNotification(e.message,'error'); } };
    window.switchToSignup = () => { document.getElementById('authModal').querySelector('h2').innerText='Signup'; /*simplified*/ };
    window.logoutUser = async () => { await signOut(auth); showProducts(); toggleMenu(); };
    window.closeModal = (id) => { document.getElementById(id).classList.remove('active'); };
    window.scrollToTop = () => window.scrollTo({top:0,behavior:'smooth'});
    window.addEventListener('scroll', () => { let fab = document.getElementById('fab'); if(window.scrollY>500) fab.classList.add('show'); else fab.classList.remove('show'); });
    onAuthStateChanged(auth, (user) => { window.currentUser = user; updateMenu(); if(user) loadProducts(); else loadProducts(); });
    loadProducts(); updateCartUI();
  </script>
</body>
</html>
